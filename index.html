    window.__routeInfo = {"path":"/","templateID":0,"sharedPropsHashes":{},"localProps":null,"allProps":{"body":{"contents":"<div class=\"content-image\"><img src=\"https://res.cloudinary.com/crip/image/upload/c_scale,w_400/v1/Company/People/Management/Johnie_Hjelm.jpg\" alt=\"Johnie Hjelm\"></div>\n\n<p>Jag är en social och driven {getAge} åring som just nu bor i Sigtuna med min hund <a href=\"http://stu.re\">Sture</a>. Är en kaffedrickande tekniknörd som älskar att resa, skapa och allt som hör där till. Jobbar till vardags som creative developer hos <a href=\"https://mrggametek.com\">MRG Gametek</a> men driver även ett <a href=\"https://johnie.se\">eget företag</a>, och på kvällarna räddar jag världen… typ – med olika projekt som <a href=\"https://crip.io\">Crip in Tech</a>, youtube-kanaler som <a href=\"https://www.youtube.com/user/JohnieWebdesign\">min egen</a> och <a href=\"https://www.youtube.com/channel/UCFyMcyLMvZ3zyf9mH41be8g\">Criptease</a>.</p>\n<p>Vegomat, musik och andra kreativa uttrycksformer är av stort intresse. Jag är arbetsledare för mina egna assistenter vilket gör beslutsvägarna härligt korta. Arbetsplatsen är där jag befinner mig vilket huvudsakligen är på mitt jobb i centrala stockholm eller hemma. Jag reser ofta med jobbet inrikes och utrikes, samt även privat. Din uppgift kommer att vara att agera som mina armar och ben då jag har en muskelsjukdom och assistera mig med allt jag inte kan göra själv, både i hemmet och utanför. Det innebär t.ex hjälp med förflyttningar, personlig omvårdnad, matlagning, samt göra trumsolon på kommando.</p>\n<p>Du som söker skall, oavsett kön eller sexuell läggning, vara mellan 18-40år, vara rökfri och ej pälsallergiker. Önskvärda egenskaper är flexibel, spontan, humor, att ha lätt att samarbeta och helst körkort. Sen att du klarar dig bra i sociala sammanhang och bara kan &quot;flyta med&quot; är också viktigt! Du ska kunna jobba dag- och kvällspass. Men du får gärna kunna vara flexibel vad det gäller arbetstider.</p>\n<h2 id=\"varf-r-ska-du-v-lja-just-detta-grymma-jobb-\">Varför ska du välja just detta grymma jobb?</h2>\n<p>Jag kan erbjuda dig är en arbetsplats med mycket högt till tak, sköna discussioner och väldigt ostressig miljö. Men också där din passioner kan växa - t.ex en av mina assistenter är <a href=\"https://open.spotify.com/artist/3Q32bNJ9bjTHSh66syuXhm?si=jeTAQRNcRcCDEB2UiZTRkA\">sveriges grymmast hiphopmusiker</a>.</p>\n<p>Individuell lönesättning enl KFS hos <a href=\"https://godassistans.se\">God Assistans</a>.</p>\n"},"title":{"contents":"<h3 id=\"-greeting-mitt-namn-r\">{greeting}! Mitt namn är</h3>\n<h1 id=\"johnie-hjelm-och-s-ker-nu-en-person-till-mitt-h-rliga-team-av-personliga-assistenter-\">Johnie Hjelm, och söker nu en person till mitt härliga team av personliga assistenter!</h1>\n"}},"siteData":{"title":"Johnie Hjelm","description":"Söker nu en person till mitt härliga team av personliga assistenter!"}};</script><script defer="" type="text/javascript" src="https://jobb.johniehjelm.me/bootstrap.6acbc265.js"></script><script defer="" type="text/javascript" src="https://jobb.johniehjelm.me/templates/src/containers/Home.04359c48.js"></script><script defer="" type="text/javascript" src="https://jobb.johniehjelm.me/main.c8b3a07c.js"></script></body></html>
